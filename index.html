<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Phantom">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#000000">
  <meta name="format-detection" content="telephone=no">
  <title>Phantom</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="assets/icon.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">

    <!-- Pull-to-refresh -->
    <div id="ptr-indicator">
      <svg viewBox="0 0 24 24" fill="none" stroke="#9945ff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="23 4 23 10 17 10"></polyline>
        <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
      </svg>
    </div>

    <!-- Header -->
    <div id="header">
      <div id="avatar-btn">K</div>
      <span id="username-overlay">kelly</span>
      <div id="header-icons">
        <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" width="22" height="22">
          <path d="M3 7V5a2 2 0 0 1 2-2h2M17 3h2a2 2 0 0 1 2 2v2M21 17v2a2 2 0 0 1-2 2h-2M7 21H5a2 2 0 0 1-2-2v-2"/>
        </svg>
        <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" width="22" height="22">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
      </div>
    </div>

    <!-- Balance -->
    <div id="balance-section">
      <div id="main-balance">$0.00</div>
      <div id="sub-balance">
        <span id="balance-change">+$0.00</span>
        <span id="balance-percent">+0.00%</span>
      </div>
    </div>

    <!-- Watch banner -->
    <div id="watch-banner">
      <svg viewBox="0 0 24 24" fill="none" stroke="#8e8e93" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" width="18" height="18">
        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
      </svg>
      <span>You are watching this account</span>
    </div>

    <!-- Token list -->
    <div id="token-scroll">
      <div id="tokens-header">
        Tokens
        <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="14" height="14" style="margin-left:4px">
          <polyline points="9 18 15 12 9 6"/>
        </svg>
      </div>

      <div id="token-list-inner">
      <div class="token-item">
        <img class="token-icon" src="assets/icons/solana.png" alt="SOL">
        <div class="token-meta">
          <div class="token-name">Solana <span class="badge-check">&#10003;</span></div>
          <div class="token-amount">0 SOL</div>
        </div>
        <div class="token-value">
          <div>$0.00</div>
          <div class="token-val2">$0.00</div>
        </div>
      </div>

      <div class="token-item">
        <img class="token-icon" src="assets/icons/ethereum.png" alt="ETH">
        <div class="token-meta">
          <div class="token-name">Ethereum <span class="badge-check">&#10003;</span></div>
          <div class="token-amount">0 ETH</div>
        </div>
        <div class="token-value">
          <div>$0.00</div>
          <div class="token-val2">$0.00</div>
        </div>
      </div>

      <div class="token-item">
        <img class="token-icon" src="assets/icons/bitcoin.png" alt="BTC">
        <div class="token-meta">
          <div class="token-name">Bitcoin <span class="badge-check">&#10003;</span> <span class="badge-tag">Native Segwit</span></div>
          <div class="token-amount">0 BTC</div>
        </div>
        <div class="token-value">
          <div>$0.00</div>
          <div class="token-val2">$0.00</div>
        </div>
      </div>

      <div class="token-item">
        <img class="token-icon" src="assets/icons/monad.png" alt="MON">
        <div class="token-meta">
          <div class="token-name">Monad <span class="badge-check">&#10003;</span></div>
          <div class="token-amount">0 MON</div>
        </div>
        <div class="token-value">
          <div>$0.00</div>
          <div class="token-val2">$0.00</div>
        </div>
      </div>

      <div class="token-item">
        <img class="token-icon" src="assets/icons/ethereum2.png" alt="ETH">
        <div class="token-meta">
          <div class="token-name">Ethereum <span class="badge-check">&#10003;</span></div>
          <div class="token-amount">0 ETH</div>
        </div>
        <div class="token-value">
          <div>$0.00</div>
          <div class="token-val2">$0.00</div>
        </div>
      </div>

      </div><!-- /token-list-inner -->
    </div>

    <!-- Bottom nav -->
    <div id="bottom-nav">
      <button class="nav-btn active">
        <svg viewBox="0 0 24 24" fill="currentColor" width="24" height="24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
      </button>
      <button class="nav-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" width="24" height="24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      </button>
      <button class="nav-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" width="24" height="24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      </button>
      <button class="nav-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" width="24" height="24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </button>
    </div>

    <!-- Admin panel -->
    <div id="admin-panel" class="hidden">
      <div id="admin-backdrop"></div>
      <div id="admin-content">
        <h3>Edit</h3>
        <div class="field">
          <label>Name</label>
          <input type="text" id="input-name" placeholder="kelly" autocomplete="off">
        </div>
        <div class="field">
          <label>Total Balance ($)</label>
          <input type="number" id="input-balance" placeholder="0.00" step="0.01" inputmode="decimal" autocomplete="off">
        </div>
        <div class="field">
          <label>Change ($)</label>
          <input type="number" id="input-change" placeholder="0.00" step="0.01" inputmode="decimal" autocomplete="off">
        </div>
        <div class="field">
          <label>Change (%)</label>
          <input type="number" id="input-percent" placeholder="0.00" step="0.01" inputmode="decimal" autocomplete="off">
        </div>
        <div class="btn-row">
          <button id="btn-close">Cancel</button>
          <button id="btn-apply">Apply</button>
        </div>
      </div>
    </div>

  </div>
  <script src="script.js"></script>
</body>
</html>
